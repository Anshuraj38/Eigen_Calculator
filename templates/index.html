<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Eigenvalue Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 0 auto;
            padding: 24px;
            background: #f7f9fc;
            color: #1f2937;
        }
        h1 {
            margin-bottom: 4px;
        }
        textarea {
            width: 100%;
            min-height: 200px;
            font-family: monospace;
            font-size: 14px;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #ffffff;
            resize: vertical;
        }
        button {
            margin-top: 14px;
            padding: 10px 18px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #1d4ed8;
        }
        .panel {
            margin-top: 20px;
            padding: 18px;
            border-radius: 10px;
            background: white;
            border: 1px solid #e2e8f0;
        }
        .error {
            margin-top: 16px;
            color: #b91c1c;
            background: #fee2e2;
            border: 1px solid #fca5a5;
            padding: 14px;
            border-radius: 8px;
        }
        pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }
    </style>
</head>
<body>
    <h1>Eigenvalue Calculator</h1>
    <p>Enter a square matrix below. Use spaces or commas between numbers, and put each row on a new line.</p>

    <div class="panel">
        <form method="post">
            <label for="matrix"><strong>Matrix input</strong></label>
            <textarea id="matrix" name="matrix" placeholder="1 2 3\n4 5 6\n7 8 10">{{ matrix_text }}</textarea>
            <button type="submit">Calculate eigenvalues</button>
        </form>
    </div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    {% if eigenvalues %}
    <div class="panel">
        <h2>Eigenvalues</h2>
        <pre>{{ eigenvalues }}</pre>
    </div>
    <div class="panel">
        <h2>Eigenvectors</h2>
        <pre>{{ eigenvectors }}</pre>
    </div>
    {% endif %}
</body>
</html>
